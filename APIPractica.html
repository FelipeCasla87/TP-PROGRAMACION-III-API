<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API PRACTICA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="APIPractica.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                Pokédex
            </a>
        </div>
    </nav>

    <main>
        <div class="container py-5">

            <div class="row justify-content-center">

                <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">

                    <div class="card shadow">

                        <div class="card-body text-center">

                            <h2 class="mb-4">
                                Selecciona un Pokémon
                            </h2>

                            <select class="form-select mb-4" id="pokemonSelect">
                                <option></option>
                            </select>

                            <img id="pokemonImage" class="img-fluid pokemon-img" alt="Pokémon">

                        </div>

                    </div>

                </div>

            </div>

        </div>
    </main>

    <footer>
        © 2026 - Aguante San Lorenzo
    </footer>

    <script>

        const API = "https://pokeapi.co/api/v2/pokemon?limit=1025";

        const select = document.getElementById("pokemonSelect");
        const image = document.getElementById("pokemonImage");

        async function cargarPokemon() {

            try {

                const respuesta = await fetch(API);
                const datos = await respuesta.json();

                select.innerHTML = "";

                datos.results.forEach(pokemon => {

                    const option = document.createElement("option");
                    option.value = pokemon.url;
                    option.textContent = pokemon.name.toUpperCase();

                    select.appendChild(option);

                });

                mostrarPokemon(select.value);

            } catch (error) {

                select.innerHTML = "<option>Error al cargar Pokémon</option>";
                console.error(error);

            }

        }

        async function mostrarPokemon(url) {

            try {

                const respuesta = await fetch(url);
                const pokemon = await respuesta.json();

                image.src = pokemon.sprites.other["official-artwork"].front_default;
                image.alt = pokemon.name;

            } catch (error) {

                console.error(error);

            }

        }

        select.addEventListener("change", () => {

            mostrarPokemon(select.value);

        });

        cargarPokemon();

    </script>

</body>
</html>
